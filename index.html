<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideQuest | Real Tasks. Real Rewards.</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #000000;
            --accent: #3B82F6;
            --success: #10B981;
            --background: #FBFDFF;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--background); 
            color: #1A1A1A;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* UI Enhancements */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .standard-card {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
            border-radius: 2.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .standard-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.1);
        }

        .btn-black {
            background: #000;
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 1.25rem;
            font-weight: 800;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
        }

        .btn-black:hover {
            background: #222;
            transform: scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        /* Profile & Status Badges */
        .badge-verified {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Chat Styling */
        .message-bubble {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1.5rem;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 1. CORE CONFIGURATION ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. MAIN APPLICATION COMPONENT ---
        const App = () => {
            const [view, setView] = useState('browse'); // 'browse', 'post', 'profile', 'my-quests', 'leaderboard'
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [quests, setQuests] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("All");
            const [activeChat, setActiveChat] = useState(null);
            const [notifications, setNotifications] = useState([]);
            
            // --- 3. AUTHENTICATION LOGIC ---
            useEffect(() => {
                const checkUser = async () => {
                    const { data: { session } } = await supabase.auth.getSession();
                    setUser(session?.user ?? null);
                    await loadQuests();
                    setLoading(false);
                };
                checkUser();

                const { data: authListener } = supabase.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                    if (session?.user) loadUserMetadata(session.user.id);
                });

                return () => authListener.subscription.unsubscribe();
            }, []);

            // --- 4. DATABASE OPERATIONS ---
            const loadQuests = async () => {
                const { data, error } = await supabase
                    .from('quests')
                    .select('*, profiles(full_name, avatar_url, rating)')
                    .order('created_at', { ascending: false });
                
                if (error) console.error("Error fetching quests:", error);
                else setQuests(data || []);
            };

            const loadUserMetadata = async (userId) => {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();
                if (data) setUser(prev => ({ ...prev, profile: data }));
            };

            const handleAcceptQuest = async (quest) => {
                if (!user) {
                    alert("Please log in to accept a quest.");
                    return;
                }
                setActiveChat(quest);
            };

            // --- 5. UI COMPONENTS ---

            const Navigation = () => (
                <nav className="fixed top-0 w-full h-24 glass-nav z-[100] px-6 md:px-16 flex items-center justify-between">
                    {/* Brand & Slogan */}
                    <div className="flex flex-col cursor-pointer group" onClick={() => setView('browse')}>
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                                <i data-lucide="zap" className="w-5 h-5 text-white fill-white"></i>
                            </div>
                            <h1 className="text-2xl font-[900] text-black tracking-tighter leading-none">SideQuest</h1>
                        </div>
                        <span className="text-[10px] font-[800] text-gray-400 uppercase tracking-[0.25em] mt-2 italic pl-1">
                            Real Tasks. Real Rewards.
                        </span>
                    </div>

                    {/* Desktop Menu */}
                    <div className="hidden lg:flex items-center gap-10 flex-grow justify-center mr-10">
                        {['Browse', 'Post a Quest', 'Leaderboard', 'My Activity'].map((item) => (
                            <button 
                                key={item}
                                onClick={() => {
                                    if (item === 'Browse') setView('browse');
                                    if (item === 'Post a Quest') setView('post');
                                    if (item === 'My Activity') setView('my-quests');
                                }}
                                className={`text-[13px] font-black uppercase tracking-widest transition-all hover:text-black ${
                                    view === item.toLowerCase().replace(' ', '-') ? 'text-black underline underline-offset-8 decoration-4' : 'text-gray-400'
                                }`}
                            >
                                {item}
                            </button>
                        ))}
                    </div>

                    {/* Auth Area */}
                    <div className="flex items-center gap-6">
                        {!user ? (
                            <div className="flex items-center gap-4">
                                <button onClick={() => supabase.auth.signInWithOAuth({ provider: 'google' })} className="text-sm font-bold text-gray-600 hover:text-black px-4">Log In</button>
                                <button className="btn-black text-sm">Join SideQuest</button>
                            </div>
                        ) : (
                            <div className="flex items-center gap-5 pl-6 border-l border-gray-100">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[13px] font-black text-black leading-none mb-1">{user.user_metadata?.full_name}</p>
                                    <span className="badge-verified">Verified</span>
                                </div>
                                <button onClick={() => setView('profile')} className="relative">
                                    <img 
                                        src={user.user_metadata?.avatar_url} 
                                        className="w-12 h-12 rounded-2xl border-2 border-white shadow-md hover:scale-110 transition" 
                                    />
                                    <div className="absolute -top-1 -right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></div>
                                </button>
                            </div>
                        )}
                    </div>
                </nav>
            );

            const MarketplaceHero = () => (
                <div className="pt-12 mb-16">
                    <div className="max-w-3xl">
                        <h2 className="text-7xl font-[950] text-black tracking-[ -0.04em] leading-[0.9] mb-8">
                            High Stakes. <br/>
                            <span className="text-gray-200">Higher Rewards.</span>
                        </h2>
                        
                        <div className="relative group max-w-2xl">
                            <div className="absolute inset-0 bg-black/5 blur-3xl group-focus-within:bg-blue-500/10 transition-all"></div>
                            <input 
                                type="text" 
                                placeholder="What's your specialty? (e.g. Code, Design, Logistics)"
                                className="relative w-full h-20 bg-white border border-gray-100 rounded-[2rem] px-16 text-xl font-bold shadow-2xl shadow-gray-100/50 focus:ring-8 focus:ring-black/5 outline-none transition-all"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <i data-lucide="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-gray-300 w-7 h-7"></i>
                            <div className="absolute right-4 top-1/2 -translate-y-1/2">
                                <button className="bg-black text-white px-8 py-3 rounded-xl text-xs font-[900] uppercase tracking-widest">Hunt</button>
                            </div>
                        </div>
                    </div>
                    
                    {/* Category Scroller */}
                    <div className="flex gap-4 mt-12 overflow-x-auto pb-4 hide-scrollbar">
                        {['All', 'Development', 'Creative', 'Logistics', 'Professional', 'Domestic'].map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setSelectedCategory(cat)}
                                className={`whitespace-nowrap px-8 py-4 rounded-2xl text-[11px] font-[900] uppercase tracking-widest transition-all ${
                                    selectedCategory === cat 
                                    ? 'bg-black text-white shadow-xl scale-105' 
                                    : 'bg-white text-gray-400 border border-gray-100 hover:border-black hover:text-black'
                                }`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>
                </div>
            );

            const QuestFeed = () => (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
                    {quests
                        .filter(q => selectedCategory === 'All' || q.category === selectedCategory)
                        .filter(q => q.title.toLowerCase().includes(searchQuery.toLowerCase()))
                        .map((quest, idx) => (
                        <div key={quest.id} className="standard-card p-10 flex flex-col justify-between group animate-slide-up" style={{animationDelay: `${idx * 0.1}s`}}>
                            <div>
                                <div className="flex justify-between items-start mb-8">
                                    <div className="px-4 py-1.5 bg-gray-50 rounded-full">
                                        <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">{quest.category}</span>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-1">Bounty</p>
                                        <p className="text-3xl font-[950] text-black leading-none">${quest.reward}</p>
                                    </div>
                                </div>
                                <h3 className="text-2xl font-extrabold text-black mb-4 leading-tight group-hover:text-blue-600 transition">{quest.title}</h3>
                                <p className="text-gray-400 text-sm font-medium leading-relaxed line-clamp-3 mb-8">
                                    {quest.description}
                                </p>
                            </div>
                            
                            <div className="pt-8 border-t border-gray-50 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gray-100 border border-gray-200 overflow-hidden">
                                        <img src={`https://api.dicebear.com/7.x/shapes/svg?seed=${quest.id}`} />
                                    </div>
                                    <div>
                                        <p className="text-[11px] font-black text-black leading-none mb-1">Client_{quest.id}02</p>
                                        <div className="flex gap-0.5">
                                            {[1,2,3,4,5].map(s => <div key={s} className="w-2 h-2 bg-yellow-400 rounded-full"></div>)}
                                        </div>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => handleAcceptQuest(quest)}
                                    className="px-6 py-3 bg-black text-white rounded-xl text-[11px] font-black uppercase tracking-widest hover:scale-105 transition active:scale-95"
                                >
                                    Engage
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            );

            const PostQuestForm = () => (
                <div className="max-w-4xl mx-auto pt-10 animate-slide-up pb-20">
                    <div className="bg-white rounded-[3.5rem] p-16 border border-gray-100 shadow-2xl">
                        <div className="mb-12">
                            <h2 className="text-5xl font-[950] text-black tracking-tight mb-4 italic">Post a Bounty.</h2>
                            <p className="text-gray-400 font-bold text-sm uppercase tracking-[0.3em]">Broadcast your mission to the network.</p>
                        </div>
                        
                        <form className="space-y-12" onSubmit={(e) => {
                            e.preventDefault();
                            alert("Bounty Broadcasted to Network.");
                            setView('browse');
                        }}>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                <div className="space-y-4">
                                    <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em] ml-2">Quest Designation</label>
                                    <input required type="text" placeholder="e.g. Project 'Phoenix' UI Design" className="w-full p-6 bg-gray-50 border-none rounded-3xl font-bold text-lg outline-none focus:ring-4 focus:ring-blue-500/5 transition" />
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em] ml-2">Bounty Reward (USD)</label>
                                    <input required type="number" placeholder="500.00" className="w-full p-6 bg-gray-50 border-none rounded-3xl font-bold text-lg outline-none focus:ring-4 focus:ring-blue-500/5 transition" />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                <div className="space-y-4">
                                    <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em] ml-2">Mission Category</label>
                                    <select className="w-full p-6 bg-gray-50 border-none rounded-3xl font-bold text-lg outline-none focus:ring-4 focus:ring-blue-500/5 transition appearance-none">
                                        <option>Development</option>
                                        <option>Creative</option>
                                        <option>Logistics</option>
                                        <option>Professional</option>
                                    </select>
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em] ml-2">Deadline (Days)</label>
                                    <input required type="number" placeholder="3" className="w-full p-6 bg-gray-50 border-none rounded-3xl font-bold text-lg outline-none focus:ring-4 focus:ring-blue-500/5 transition" />
                                </div>
                            </div>

                            <div className="space-y-4">
                                <label className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em] ml-2">Mission Briefing</label>
                                <textarea required rows="6" placeholder="Provide technical specs and deliverables..." className="w-full p-8 bg-gray-50 border-none rounded-[2.5rem] font-bold text-lg outline-none focus:ring-4 focus:ring-blue-500/5 transition resize-none"></textarea>
                            </div>

                            <button type="submit" className="w-full bg-black text-white py-10 rounded-[2.5rem] font-[950] text-2xl uppercase tracking-[0.2em] shadow-2xl hover:scale-[1.01] transition active:scale-95">
                                Initialize Quest
                            </button>
                        </form>
                    </div>
                </div>
            );

            const ProfileDashboard = () => (
                <div className="max-w-6xl mx-auto pt-10 pb-20 animate-slide-up">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                        {/* Profile Card */}
                        <div className="lg:col-span-1 space-y-8">
                            <div className="bg-white p-12 rounded-[3.5rem] border border-gray-100 shadow-xl text-center">
                                <div className="relative w-32 h-32 mx-auto mb-8">
                                    <img src={user?.user_metadata?.avatar_url} className="w-32 h-32 rounded-[2.5rem] border-4 border-white shadow-lg" />
                                    <div className="absolute -bottom-2 -right-2 bg-blue-600 p-2 rounded-xl text-white shadow-lg">
                                        <i data-lucide="shield-check" className="w-5 h-5"></i>
                                    </div>
                                </div>
                                <h2 className="text-3xl font-[950] text-black tracking-tight mb-2">{user?.user_metadata?.full_name}</h2>
                                <p className="text-gray-400 font-extrabold text-[10px] uppercase tracking-widest mb-8">Professional Operative</p>
                                
                                <div className="flex justify-center gap-4 border-t pt-8">
                                    <div className="text-center">
                                        <p className="text-xl font-black">24</p>
                                        <p className="text-[9px] font-bold text-gray-300 uppercase tracking-widest">Success</p>
                                    </div>
                                    <div className="w-px h-10 bg-gray-100"></div>
                                    <div className="text-center">
                                        <p className="text-xl font-black">4.9</p>
                                        <p className="text-[9px] font-bold text-gray-300 uppercase tracking-widest">Rating</p>
                                    </div>
                                    <div className="w-px h-10 bg-gray-100"></div>
                                    <div className="text-center">
                                        <p className="text-xl font-black">$2.4k</p>
                                        <p className="text-[9px] font-bold text-gray-300 uppercase tracking-widest">Earnings</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-black p-10 rounded-[2.5rem] shadow-2xl text-white">
                                <h4 className="text-[10px] font-black uppercase tracking-[0.4em] text-gray-500 mb-6 italic">Skill Matrix</h4>
                                <div className="space-y-4">
                                    {['UI Architecture', 'Logistics', 'Creative Direction'].map(skill => (
                                        <div key={skill} className="flex items-center justify-between">
                                            <span className="text-xs font-bold">{skill}</span>
                                            <div className="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                                <div className="w-3/4 h-full bg-blue-500"></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Activity Feed & Reviews */}
                        <div className="lg:col-span-2 space-y-10">
                            <div className="bg-white p-12 rounded-[3.5rem] border border-gray-100 shadow-xl">
                                <h4 className="text-sm font-[950] uppercase tracking-[0.3em] text-gray-300 mb-10 italic">Recent Transmissions</h4>
                                <div className="space-y-8">
                                    {[1, 2, 3].map(i => (
                                        <div key={i} className="flex gap-6 pb-8 border-b border-gray-50 last:border-0 last:pb-0">
                                            <div className="w-12 h-12 rounded-2xl bg-gray-50 flex items-center justify-center shrink-0">
                                                <i data-lucide="check-circle-2" className="w-6 h-6 text-green-500"></i>
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-start mb-2">
                                                    <h5 className="font-black text-lg">Mission: Project Apex Migration</h5>
                                                    <span className="text-yellow-400 font-bold text-xs italic">★★★★★</span>
                                                </div>
                                                <p className="text-gray-400 text-sm font-medium mb-4">"Exceptional execution. Completed the task 3 hours before the deadline. Technical skills are top-tier."</p>
                                                <div className="flex items-center gap-4 text-[10px] font-black text-gray-300 uppercase tracking-widest italic">
                                                    <span>Client: ZeroSum_Alpha</span>
                                                    <span>$450 Bounty</span>
                                                    <span>2 days ago</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const GlobalChat = () => {
                if (!activeChat) return null;
                return (
                    <div className="fixed bottom-10 right-10 w-[450px] h-[650px] bg-white rounded-[3rem] shadow-2xl border border-gray-100 flex flex-col z-[1000] overflow-hidden animate-slide-up">
                        {/* Header */}
                        <div className="p-8 bg-black text-white flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 rounded-2xl bg-gray-900 flex items-center justify-center border border-gray-800">
                                    <i data-lucide="message-square" className="w-6 h-6 text-blue-500"></i>
                                </div>
                                <div>
                                    <h4 className="text-sm font-black truncate max-w-[200px] mb-1">{activeChat.title}</h4>
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                        <span className="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em] italic">Live Connection</span>
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => setActiveChat(null)} className="p-3 hover:bg-gray-900 rounded-2xl transition">
                                <i data-lucide="x" className="w-6 h-6"></i>
                            </button>
                        </div>

                        {/* Messages */}
                        <div className="flex-grow p-8 overflow-y-auto bg-gray-50 space-y-6">
                            <div className="flex flex-col gap-2">
                                <div className="message-bubble bg-white text-gray-600 shadow-sm rounded-bl-none">
                                    Welcome to the secure channel. Briefly explain your plan for this bounty.
                                </div>
                                <span className="text-[9px] font-black text-gray-300 uppercase ml-2 tracking-widest italic leading-none">System • 12:45 PM</span>
                            </div>

                            <div className="flex flex-col gap-2 items-end">
                                <div className="message-bubble bg-black text-white shadow-xl rounded-br-none">
                                    Acknowledged. I've analyzed the mission brief. I can initiate the UI overhaul immediately using the existing design system.
                                </div>
                                <span className="text-[9px] font-black text-gray-300 uppercase mr-2 tracking-widest italic leading-none">You • 12:46 PM</span>
                            </div>
                            
                            <div className="text-center pt-4">
                                <span className="bg-gray-100 px-4 py-1.5 rounded-full text-[9px] font-black text-gray-400 uppercase tracking-widest">Client is typing...</span>
                            </div>
                        </div>

                        {/* Input */}
                        <div className="p-6 bg-white border-t border-gray-100">
                            <div className="flex items-center gap-4 bg-gray-50 p-2 rounded-[1.75rem] border border-transparent focus-within:border-gray-200 transition">
                                <input 
                                    type="text" 
                                    placeholder="Type your transmission..." 
                                    className="flex-grow bg-transparent border-none px-4 py-3 text-sm font-bold focus:ring-0 outline-none" 
                                />
                                <button className="bg-black text-white p-4 rounded-2xl shadow-xl hover:bg-blue-600 transition group">
                                    <i data-lucide="send" className="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                                </button>
                            </div>
                            <div className="flex justify-center gap-6 mt-4">
                                <button className="text-[9px] font-black text-gray-300 uppercase tracking-widest hover:text-black transition">Attach Brief</button>
                                <button className="text-[9px] font-black text-gray-300 uppercase tracking-widest hover:text-black transition">Propose Bounty Edit</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 6. RENDER RE-SYNC ---
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // --- 7. MASTER RENDER ---
            return (
                <div className="min-h-screen">
                    <Navigation />
                    
                    <main className="pt-32 px-6 md:px-16 max-w-[1600px] mx-auto pb-32">
                        {view === 'browse' && (
                            <div className="fade-in">
                                <MarketplaceHero />
                                <QuestFeed />
                            </div>
                        )}
                        
                        {view === 'post' && <PostQuestForm />}
                        
                        {view === 'profile' && <ProfileDashboard />}
                        
                        {view === 'my-quests' && (
                            <div className="max-w-4xl mx-auto pt-10 text-center animate-slide-up">
                                <div className="bg-white p-20 rounded-[3.5rem] border border-gray-100 shadow-xl">
                                    <div className="w-20 h-20 bg-gray-50 rounded-3xl flex items-center justify-center mx-auto mb-8">
                                        <i data-lucide="activity" className="w-10 h-10 text-gray-200"></i>
                                    </div>
                                    <h2 className="text-3xl font-[950] mb-4 tracking-tight">Active Deployments</h2>
                                    <p className="text-gray-400 font-bold text-sm uppercase tracking-widest mb-10 leading-relaxed">
                                        You are currently not deployed on any active quests. <br/>
                                        Return to the marketplace to find an open mission.
                                    </p>
                                    <button onClick={() => setView('browse')} className="btn-black">Browse Marketplace</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Persistant Global Elements */}
                    <GlobalChat />
                    
                    {/* Floating HUD for Earners */}
                    {user && (
                        <div className="fixed bottom-10 left-10 bg-black text-white px-8 py-5 rounded-3xl shadow-2xl flex items-center gap-8 border border-gray-800 z-[500] animate-slide-up">
                            <div>
                                <p className="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1 leading-none">Net Earnings</p>
                                <p className="text-xl font-[950] leading-none">$2,450.00</p>
                            </div>
                            <div className="w-px h-8 bg-gray-800"></div>
                            <div>
                                <p className="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1 leading-none">Open Bounties</p>
                                <p className="text-xl font-[950] leading-none">12</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 8. INITIALIZE DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
