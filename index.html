<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideQuest | Premium Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // DATABASE CONNECTION
        // ==========================================
        const { createClient } = supabase;
        const supabaseUrl = 'https://rmajagnleibmlmcktpae.supabase.co';
        const supabaseKey = 'sb_publishable_egu0MKgcW8jm0IpG9PQbgQ_5ClCWNNf';
        const _supabase = createClient(supabaseUrl, supabaseKey);

        const App = () => {
            const [quests, setQuests] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            
            // Form State
            const [formData, setFormData] = React.useState({
                title: '',
                description: '',
                reward: '',
                category: 'General',
                address: ''
            });

            // LOAD DATA FROM OHIO
            const fetchQuests = async () => {
                setLoading(true);
                const { data, error } = await _supabase
                    .from('tasks')
                    .select('*')
                    .eq('status', 'Open')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Error loading quests:", error.message);
                } else {
                    setQuests(data || []);
                }
                setLoading(false);
            };

            React.useEffect(() => {
                fetchQuests();
            }, []);

            // SAVE DATA PERMANENTLY
            const handleSubmit = async (e) => {
                e.preventDefault();
                const { error } = await _supabase
                    .from('tasks')
                    .insert([{
                        title: formData.title,
                        description: formData.description,
                        reward: parseInt(formData.reward),
                        category: formData.category,
                        address: formData.address,
                        status: 'Open'
                    }]);

                if (error) {
                    alert("Error saving: " + error.message);
                } else {
                    setFormData({ title: '', description: '', reward: '', category: 'General', address: '' });
                    setIsModalOpen(false);
                    fetchQuests(); // Refresh board
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-10 px-6 py-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">S</div>
                                <span className="text-xl font-extrabold text-slate-900 tracking-tight">SideQuest</span>
                            </div>
                            <button 
                                onClick={() => setIsModalOpen(true)}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-indigo-200"
                            >
                                + Post a Quest
                            </button>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-5xl mx-auto px-6 pt-8">
                        <div className="mb-8">
                            <h2 className="text-3xl font-extrabold text-slate-900 mb-2">Available Quests</h2>
                            <p className="text-slate-500 font-medium">Real-time opportunities in Riverview, NB</p>
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20">
                                <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-500 font-bold">Connecting to Cloud Database...</p>
                            </div>
                        ) : quests.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                                <div className="text-5xl mb-4">📍</div>
                                <p className="text-slate-900 font-bold text-xl">Board is currently empty</p>
                                <p className="text-slate-500">Be the first to post a SideQuest in your neighborhood!</p>
                            </div>
                        ) : (
                            <div className="grid gap-6 md:grid-cols-2">
                                {quests.map((quest) => (
                                    <div key={quest.id} className="bg-white p-6 rounded-3xl border border-slate-100 card-shadow transition-transform hover:-translate-y-1">
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="px-4 py-1.5 bg-indigo-50 text-indigo-700 rounded-full text-xs font-extrabold uppercase tracking-wider">
                                                {quest.category}
                                            </span>
                                            <div className="text-3xl font-black text-green-600">${quest.reward}</div>
                                        </div>
                                        <h3 className="text-xl font-extrabold text-slate-900 mb-2">{quest.title}</h3>
                                        <p className="text-slate-600 font-medium mb-6 leading-relaxed">{quest.description}</p>
                                        <div className="flex items-center justify-between pt-4 border-t border-slate-50">
                                            <div className="flex items-center text-slate-500 font-bold text-sm">
                                                <span className="mr-2">📍</span> {quest.address}
                                            </div>
                                            <button className="text-indigo-600 font-extrabold text-sm hover:underline">Accept Quest →</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="text-xl font-black text-slate-900">Post New Quest</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 font-bold text-2xl">&times;</button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-black text-slate-700 mb-1">Quest Title</label>
                                        <input 
                                            required 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-medium outline-none focus:border-indigo-500 transition-colors"
                                            placeholder="e.g. Lawn Mowing"
                                            value={formData.title}
                                            onChange={(e) => setFormData({...formData, title: e.target.value})}
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-black text-slate-700 mb-1">Reward ($)</label>
                                            <input 
                                                required type="number"
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-medium outline-none focus:border-indigo-500 transition-colors"
                                                placeholder="25"
                                                value={formData.reward}
                                                onChange={(e) => setFormData({...formData, reward: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-black text-slate-700 mb-1">Category</label>
                                            <select 
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-medium outline-none focus:border-indigo-500 transition-colors"
                                                value={formData.category}
                                                onChange={(e) => setFormData({...formData, category: e.target.value})}
                                            >
                                                <option>General</option>
                                                <option>Labor</option>
                                                <option>Tech</option>
                                                <option>Delivery</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-black text-slate-700 mb-1">Location/Address</label>
                                        <input 
                                            required 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-medium outline-none focus:border-indigo-500 transition-colors"
                                            placeholder="Riverview, NB"
                                            value={formData.address}
                                            onChange={(e) => setFormData({...formData, address: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-black text-slate-700 mb-1">Description</label>
                                        <textarea 
                                            required 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-medium outline-none focus:border-indigo-500 transition-colors h-24"
                                            placeholder="Describe the task..."
                                            value={formData.description}
                                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        ></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                                        Launch Quest
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
