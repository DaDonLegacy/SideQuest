<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidequest | Local Task Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const INITIAL_TASKS = [
            { id: 1, title: 'Walk my Golden Retriever', description: 'Need someone to walk Buster for an hour this afternoon.', reward: 30, category: 'Errands', status: 'Open', postedBy: 'Alex J.', avatar: 'https://ui-avatars.com/api/?name=AJ&background=random' },
            { id: 2, title: 'Clean up yard debris', description: 'Storm cleanup. Branches and leaves need bagging.', reward: 100, category: 'Labor', status: 'Pending', postedBy: 'Sarah M.', avatar: 'https://ui-avatars.com/api/?name=SM&background=random' },
            { id: 3, title: 'Fix CSS bug', description: 'Responsive design fix for a local business site.', reward: 50, category: 'Digital', status: 'Open', postedBy: 'Riverview Tech', avatar: 'https://ui-avatars.com/api/?name=RT&background=000&color=fff' }
        ];

        function App() {
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [user, setUser] = useState(null); // Simple Auth State
            const [view, setView] = useState('browse'); // browse, profile
            const [searchQuery, setSearchQuery] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [isPostModalOpen, setIsPostModalOpen] = useState(false);
            const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
            const [activeChat, setActiveChat] = useState(null);
            const [completedTask, setCompletedTask] = useState(null);

            // Filtering Logic
            const filteredTasks = useMemo(() => {
                return tasks.filter(t => {
                    const matchesCat = activeCategory === 'All' || t.category === activeCategory;
                    const matchesSearch = t.title.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCat && matchesSearch;
                });
            }, [tasks, activeCategory, searchQuery]);

            const handleAccept = (task) => {
                if (!user) return setIsAuthModalOpen(true);
                setTasks(tasks.map(t => t.id === task.id ? {...t, status: 'Pending'} : t));
                setActiveChat(task);
            };

            const handleComplete = (task) => {
                setTasks(tasks.map(t => t.id === task.id ? {...t, status: 'Completed'} : t));
                setCompletedTask(task);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAV */}
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('browse')}>
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white"><Icon name="zap" /></div>
                            <span className="text-xl font-black tracking-tighter">SIDEQUEST</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => user ? setIsPostModalOpen(true) : setIsAuthModalOpen(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2">
                                <Icon name="plus" className="w-4 h-4" /> <span>Post Task</span>
                            </button>
                            {user ? (
                                <img src={user.avatar} className="w-9 h-9 rounded-full border-2 border-indigo-100" />
                            ) : (
                                <button onClick={() => setIsAuthModalOpen(true)} className="text-slate-600 font-bold text-sm px-2">Login</button>
                            )}
                        </div>
                    </nav>

                    {/* HERO & SEARCH */}
                    <div className="bg-white border-b border-slate-100 px-4 py-8">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-2xl font-black mb-6">Find your next Task.</h1>
                            <div className="relative group">
                                <div className="absolute inset-y-0 left-4 flex items-center text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                                    <Icon name="search" className="w-5 h-5" />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="Search tasks (e.g. mowing, coding, delivery)..." 
                                    className="w-full pl-12 pr-4 py-4 bg-slate-100 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl outline-none transition-all font-medium"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>
                    </div>

                    {/* CATEGORIES */}
                    <div className="flex gap-2 p-4 overflow-x-auto hide-scrollbar bg-slate-50 sticky top-16 z-30">
                        {['All', 'Labor', 'Errands', 'Digital', 'Creative', 'Home'].map(c => (
                            <button 
                                key={c}
                                onClick={() => setActiveCategory(c)}
                                className={`px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${activeCategory === c ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-500 border border-slate-200'}`}
                            >{c}</button>
                        ))}
                    </div>

                    {/* MAIN GRID */}
                    <main className="max-w-6xl mx-auto px-4 py-6 w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 flex-grow">
                        {filteredTasks.map(task => (
                            <div key={task.id} className="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm flex flex-col hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-start mb-4">
                                    <span className={`text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-widest ${
                                        task.status === 'Open' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'
                                    }`}>{task.status}</span>
                                    <span className="text-2xl font-black text-slate-900">${task.reward}</span>
                                </div>
                                <h3 className="text-lg font-extrabold mb-2 leading-tight">{task.title}</h3>
                                <p className="text-slate-500 text-sm mb-6 line-clamp-2">{task.description}</p>
                                
                                <div className="mt-auto pt-4 border-t border-slate-50 flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2">
                                        <img src={task.avatar} className="w-7 h-7 rounded-full" />
                                        <span className="text-xs font-bold text-slate-700">{task.postedBy}</span>
                                    </div>
                                    <div className="flex items-center text-amber-500 font-bold text-[10px]">
                                        <Icon name="star" className="w-3 h-3 fill-current mr-1" /> 4.9
                                    </div>
                                </div>

                                {task.status === 'Open' ? (
                                    <button onClick={() => handleAccept(task)} className="w-full bg-slate-900 text-white font-black py-3 rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all">Accept Task</button>
                                ) : task.status === 'Pending' ? (
                                    <button onClick={() => handleComplete(task)} className="w-full bg-indigo-100 text-indigo-700 font-black py-3 rounded-2xl">Mark Completed</button>
                                ) : (
                                    <button disabled className="w-full bg-slate-100 text-slate-400 font-black py-3 rounded-2xl uppercase text-xs tracking-widest">Task Finished</button>
                                )}
                            </div>
                        ))}
                    </main>

                    {/* AUTH MODAL */}
                    {isAuthModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
                                <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-600"><Icon name="user" className="w-8 h-8" /></div>
                                <h2 className="text-2xl font-black mb-2">Join Sidequest</h2>
                                <p className="text-slate-500 text-sm mb-8 font-medium px-4">Create a profile to start earning and posting tasks in your area.</p>
                                <div className="space-y-3">
                                    <input type="text" placeholder="Full Name" className="w-full p-4 bg-slate-100 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500 font-bold" />
                                    <button onClick={() => { setUser({name: 'Michael', avatar: 'https://ui-avatars.com/api/?name=M&background=6366f1&color=fff'}); setIsAuthModalOpen(false); }} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl">Create Profile</button>
                                </div>
                                <button onClick={() => setIsAuthModalOpen(false)} className="mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest">Cancel</button>
                            </div>
                        </div>
                    )}

                    {/* REVIEW MODAL */}
                    {completedTask && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-emerald-900/40 backdrop-blur-md p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl">
                                <div className="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-600 animate-bounce"><Icon name="check-circle" className="w-10 h-10" /></div>
                                <h2 className="text-2xl font-black mb-2 text-slate-900">Task Complete!</h2>
                                <p className="text-slate-500 text-sm mb-8 font-medium">How was your experience working with <strong>{completedTask.postedBy}</strong>?</p>
                                <div className="flex justify-center gap-2 mb-8">
                                    {[1,2,3,4,5].map(s => <button key={s} className="text-slate-200 hover:text-amber-400 transition-colors"><Icon name="star" className="w-8 h-8 fill-current" /></button>)}
                                </div>
                                <button onClick={() => setCompletedTask(null)} className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl">Submit Review</button>
                            </div>
                        </div>
                    )}

                    {/* CHAT PANEL (SIMULATED) */}
                    {activeChat && (
                        <div className="fixed bottom-4 right-4 z-40 bg-white w-80 h-96 rounded-3xl shadow-2xl border border-slate-200 flex flex-col overflow-hidden">
                            <div className="p-4 bg-slate-900 text-white flex justify-between items-center">
                                <span className="font-bold flex items-center gap-2"><div className="w-2 h-2 bg-emerald-400 rounded-full"></div> {activeChat.postedBy}</span>
                                <button onClick={() => setActiveChat(null)}><Icon name="x" className="w-4 h-4" /></button>
                            </div>
                            <div className="flex-grow p-4 flex flex-col justify-end gap-2 overflow-y-auto bg-slate-50">
                                <div className="bg-indigo-600 text-white p-3 rounded-2xl rounded-br-none text-xs self-end max-w-[80%] font-medium">Hey! I've accepted your task for "{activeChat.title}".</div>
                                <div className="bg-white border border-slate-200 p-3 rounded-2xl rounded-bl-none text-xs self-start max-w-[80%] font-medium text-slate-600 shadow-sm">Awesome! Let me know when you can start.</div>
                            </div>
                            <div className="p-3 border-t flex gap-2">
                                <input type="text" placeholder="Type a message..." className="flex-grow bg-slate-100 rounded-full px-4 py-2 text-xs outline-none" />
                                <button className="bg-indigo-600 text-white p-2 rounded-full"><Icon name="send" className="w-4 h-4" /></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
