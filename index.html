<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideQuest | Real Tasks. Real Rewards.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-10 h-20 bg-white border-b border-gray-200 fixed top-0 w-full z-50">
        <div class="flex flex-col cursor-pointer" onclick="window.location.href='/'">
            <h1 class="text-2xl font-extrabold text-black leading-none">SideQuest</h1>
            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Real Tasks. Real Rewards.</span>
        </div>

        <div class="hidden md:flex gap-8 flex-grow ml-12">
            <a href="#browse" class="text-sm font-semibold text-gray-700 hover:text-black">Browse</a>
            <a href="#post" class="text-sm font-semibold text-gray-700 hover:text-black">Post a Quest</a>
            <a href="#categories" class="text-sm font-semibold text-gray-700 hover:text-black">Categories</a>
        </div>

        <div class="flex items-center gap-4">
            <button id="loginBtn" class="text-sm font-bold text-gray-900 px-4 py-2 hover:bg-gray-100 rounded-lg transition">Log In</button>
            <button id="signupBtn" class="text-sm font-bold bg-black text-white px-6 py-2.5 rounded-lg hover:bg-gray-800 transition shadow-lg">Sign Up</button>
        </div>
    </nav>

    <div class="h-20"></div>

    <main class="p-10 text-center">
        <h2 class="text-4xl font-black mt-20">The Marketplace for Serious Side Hustlers</h2>
        <p class="text-gray-500 mt-4">Complete real-world tasks and earn verified rewards.</p>
    </main>

    <script>
        // --- SUPABASE CONFIG ---
        // Replace these with your actual keys from Supabase Settings > API
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- BUTTON LOGIC ---
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) alert("Login Error: " + error.message);
        });

        document.getElementById('signupBtn').addEventListener('click', () => {
            alert("Sign Up logic goes here or redirect to a signup page.");
        });
    </script>
</body>
</html>
