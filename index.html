<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidequest | Premium Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .suspended-blur { filter: blur(12px); pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            // State
            const [user, setUser] = useState(null); 
            const [tasks, setTasks] = useState([]); // Started clean as requested
            const [searchQuery, setSearchQuery] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [isPostModalOpen, setIsPostModalOpen] = useState(false);
            const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
            const [activeChat, setActiveChat] = useState(null);
            const [reviewingTask, setReviewingTask] = useState(null);

            // 1. SIGN UP HANDLER
            const handleSignup = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newUser = {
                    name: formData.get('name'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    location: formData.get('location'),
                    avatar: `https://ui-avatars.com/api/?name=${formData.get('name')}&background=6366f1&color=fff`,
                    rating: 5.0,
                    reviewCount: 0,
                    status: 'active'
                };
                setUser(newUser);
                setIsAuthModalOpen(false);
            };

            // 2. TASK CREATION HANDLER
            const handleCreateTask = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newTask = {
                    id: Date.now(),
                    title: formData.get('title'),
                    description: formData.get('description'),
                    reward: formData.get('reward'),
                    category: formData.get('category'),
                    address: formData.get('address'), // Captured but hidden initially
                    status: 'Open',
                    postedBy: user.name,
                    avatar: user.avatar
                };
                setTasks([newTask, ...tasks]);
                setIsPostModalOpen(false);
            };

            // 3. REVIEW & SUSPENSION LOGIC
            const handleReviewSubmit = (newRating) => {
                const totalReviews = user.reviewCount + 1;
                const updatedAverage = ((user.rating * user.reviewCount) + newRating) / totalReviews;
                const isSuspended = updatedAverage < 2.5;

                setUser(prev => ({
                    ...prev,
                    rating: Number(updatedAverage.toFixed(1)),
                    reviewCount: totalReviews,
                    status: isSuspended ? 'suspended' : 'active'
                }));
                setReviewingTask(null);
            };

            const filteredTasks = useMemo(() => {
                return tasks.filter(t => {
                    const matchesSearch = t.title.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCat = activeCategory === 'All' || t.category === activeCategory;
                    return matchesSearch && matchesCat;
                });
            }, [tasks, searchQuery, activeCategory]);

            return (
                <div className="min-h-screen flex flex-col relative">
                    
                    {/* SUSPENSION OVERLAY */}
                    {user?.status === 'suspended' && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-6 text-center">
                            <div className="max-w-md bg-white rounded-[3rem] p-12 shadow-2xl">
                                <div className="bg-red-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-red-600">
                                    <Icon name="octagon-alert" className="w-10 h-10" />
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 mb-4 tracking-tight">Account Restricted</h2>
                                <p className="text-slate-500 font-medium mb-8">Rating dropped below 2.5 stars. To maintain community quality, access has been disabled.</p>
                                <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-slate-800 transition-all">Support Center</button>
                            </div>
                        </div>
                    )}

                    <div className={user?.status === 'suspended' ? 'suspended-blur' : ''}>
                        {/* NAVBAR */}
                        <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                                    <Icon name="zap" className="w-6 h-6" />
                                </div>
                                <span className="text-2xl font-extrabold tracking-tighter text-slate-900 italic uppercase">Sidequest</span>
                            </div>

                            <div className="flex items-center gap-4">
                                <button onClick={() => user ? setIsPostModalOpen(true) : setIsAuthModalOpen(true)} className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:scale-[1.02] transition-all flex items-center gap-2">
                                    <Icon name="plus" className="w-4 h-4" /> <span className="hidden md:inline">Post Task</span>
                                </button>
                                {user ? (
                                    <div className="flex items-center gap-3 bg-white p-1.5 pr-4 rounded-full border border-slate-200">
                                        <img src={user.avatar} className="w-8 h-8 rounded-full" />
                                        <div className="hidden sm:block">
                                            <p className="font-bold text-[10px] text-slate-900 leading-none">{user.name}</p>
                                            <p className="text-[9px] font-bold text-indigo-600 mt-1 uppercase tracking-tighter">{user.rating} Stars</p>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => setIsAuthModalOpen(true)} className="bg-indigo-50 text-indigo-600 px-6 py-3 rounded-2xl font-bold">Sign Up</button>
                                )}
                            </div>
                        </nav>

                        {/* HERO */}
                        <div className="bg-white border-b border-slate-100 px-6 pt-16 pb-12 text-center">
                            <h1 className="text-4xl md:text-5xl font-black text-slate-900 mb-6 tracking-tight">Your New <span className="text-indigo-600">Side Hustle.</span></h1>
                            <div className="max-w-2xl mx-auto relative group">
                                <div className="absolute inset-y-0 left-6 flex items-center text-slate-300 group-focus-within:text-indigo-600 transition-colors">
                                    <Icon name="search" className="w-6 h-6" />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="What do you need help with?" 
                                    className="w-full pl-16 pr-8 py-5 bg-slate-50 border-2 border-transparent focus:border-indigo-600 focus:bg-white rounded-[2.5rem] outline-none font-bold text-lg shadow-sm transition-all"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>

                        {/* FILTERS */}
                        <div className="flex gap-2 p-6 overflow-x-auto hide-scrollbar sticky top-20 z-40 bg-[#F8FAFC]/90 backdrop-blur-sm">
                            {['All', 'Labor', 'Errands', 'Digital', 'Creative'].map(c => (
                                <button 
                                    key={c}
                                    onClick={() => setActiveCategory(c)}
                                    className={`px-6 py-3 rounded-full text-sm font-bold transition-all whitespace-nowrap ${activeCategory === c ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border border-slate-200'}`}
                                >{c}</button>
                            ))}
                        </div>

                        {/* TASK LIST */}
                        <main className="max-w-7xl mx-auto px-6 pb-24 w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {filteredTasks.length > 0 ? filteredTasks.map(task => (
                                <div key={task.id} className="bg-white rounded-[2.5rem] p-8 card-shadow border border-slate-100 flex flex-col hover:translate-y-[-4px] transition-all">
                                    <div className="flex justify-between items-start mb-6">
                                        <span className={`text-[10px] font-black px-3 py-1.5 rounded-xl uppercase tracking-widest ${
                                            task.status === 'Open' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'
                                        }`}>{task.status}</span>
                                        <span className="text-3xl font-black text-slate-900">${task.reward}</span>
                                    </div>
                                    <h3 className="text-xl font-extrabold mb-3 text-slate-800">{task.title}</h3>
                                    <p className="text-slate-500 text-sm mb-6 leading-relaxed line-clamp-2">{task.description}</p>
                                    
                                    {/* ADDRESS PRIVACY LOGIC */}
                                    <div className="mb-8 p-4 bg-slate-50 rounded-2xl flex items-center gap-3 text-slate-400">
                                        <Icon name="map-pin" className="w-4 h-4" />
                                        <span className="text-xs font-bold uppercase tracking-widest">
                                            {task.status === 'Open' ? "Location Hidden until Accepted" : task.address}
                                        </span>
                                    </div>

                                    <div className="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between mb-6">
                                        <div className="flex items-center gap-3 font-bold text-xs text-slate-700">
                                            <img src={task.avatar} className="w-8 h-8 rounded-full" />
                                            <span>{task.postedBy}</span>
                                        </div>
                                    </div>

                                    {task.status === 'Open' ? (
                                        <button onClick={() => {
                                            if(!user) return setIsAuthModalOpen(true);
                                            setTasks(tasks.map(t => t.id === task.id ? {...t, status: 'Pending'} : t));
                                            setActiveChat(task);
                                        }} className="w-full bg-slate-900 text-white font-black py-4 rounded-[1.5rem]">Accept Task</button>
                                    ) : task.status === 'Pending' ? (
                                        <button onClick={() => {
                                            setTasks(tasks.map(t => t.id === task.id ? {...t, status: 'Completed'} : t));
                                            setReviewingTask(task);
                                        }} className="w-full bg-indigo-50 text-indigo-600 font-black py-4 rounded-[1.5rem]">Mark Completed</button>
                                    ) : (
                                        <button disabled className="w-full bg-slate-100 text-slate-400 font-black py-4 rounded-[1.5rem]">Task Finished</button>
                                    )}
                                </div>
                            )) : (
                                <div className="col-span-full py-32 text-center">
                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-300">
                                        <Icon name="clipboard" className="w-10 h-10" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-300 uppercase tracking-tighter">No Active Sidequests</h2>
                                    <p className="text-slate-400 font-medium">Be the first to post a task in your area!</p>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* FULL SIGN UP MODAL */}
                    {isAuthModalOpen && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-6">
                            <div className="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
                                <button onClick={() => setIsAuthModalOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-900"><Icon name="x" /></button>
                                <h2 className="text-3xl font-black mb-2">Create Profile</h2>
                                <p className="text-slate-500 font-medium mb-8">Set up your account to start sidequesting.</p>
                                <form onSubmit={handleSignup} className="space-y-5">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Name</label>
                                            <input name="name" required placeholder="Michael L." className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Phone</label>
                                            <input name="phone" required placeholder="(506) 555-0123" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600" />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Email Address</label>
                                        <input name="email" type="email" required placeholder="mike@example.com" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Home City/Region</label>
                                        <input name="location" required placeholder="Riverview, NB" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600" />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-indigo-100 mt-4 hover:bg-indigo-700 transition-all">Complete Profile</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* POST TASK MODAL */}
                    {isPostModalOpen && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-6">
                            <div className="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
                                <button onClick={() => setIsPostModalOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-900"><Icon name="x" /></button>
                                <h2 className="text-3xl font-black mb-2">Post a Quest</h2>
                                <p className="text-slate-500 font-medium mb-8">What do you need help with today?</p>
                                <form onSubmit={handleCreateTask} className="space-y-5">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Task Title</label>
                                        <input name="title" required placeholder="e.g. Help Mowing Lawn" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Reward ($)</label>
                                            <input name="reward" type="number" required placeholder="50" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Category</label>
                                            <select name="category" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600 appearance-none">
                                                <option>Labor</option>
                                                <option>Errands</option>
                                                <option>Digital</option>
                                                <option>Creative</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Exact Address (Hidden until Accepted)</label>
                                        <input name="address" required placeholder="123 Riverview Dr, E1B 3H2" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2">Description</label>
                                        <textarea name="description" required rows="3" placeholder="Provide some details..." className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-600 resize-none"></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-slate-100 transition-all">Launch Quest</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* REVIEW MODAL */}
                    {reviewingTask && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-emerald-900/40 backdrop-blur-md p-6">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
                                <Icon name="star" className="w-16 h-16 text-amber-400 mx-auto mb-6 fill-current" />
                                <h2 className="text-2xl font-black mb-2 text-slate-900">Task Complete</h2>
                                <p className="text-slate-500 font-medium mb-8">How would you rate the experience? This affects account standing.</p>
                                <div className="flex justify-center gap-3 mb-10">
                                    {[1,2,3,4,5].map(s => (
                                        <button key={s} onClick={() => handleReviewSubmit(s)} className="text-slate-100 hover:text-amber-400 transition-all">
                                            <Icon name="star" className="w-10 h-10 fill-current" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CHAT WINDOW */}
                    {activeChat && (
                        <div className="fixed bottom-6 right-6 z-50 w-[380px] bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden flex flex-col h-[500px]">
                            <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                                <div className="flex items-center gap-3 font-bold">
                                    <img src={activeChat.avatar} className="w-10 h-10 rounded-full border border-white/20" />
                                    <span>{activeChat.postedBy}</span>
                                </div>
                                <button onClick={() => setActiveChat(null)} className="text-slate-400 hover:text-white"><Icon name="x" /></button>
                            </div>
                            <div className="flex-grow p-6 space-y-4 bg-slate-50 overflow-y-auto">
                                <div className="bg-white border p-4 rounded-3xl rounded-bl-none text-xs font-bold text-slate-600 shadow-sm max-w-[85%]">
                                    Thanks for accepting! Since we've agreed, here is the location: <br/> <strong className="text-indigo-600 mt-2 block">{activeChat.address}</strong>
                                </div>
                                <div className="bg-indigo-600 text-white p-4 rounded-3xl rounded-br-none text-xs font-bold self-end ml-auto max-w-[85%]">
                                    Got it! See you shortly.
                                </div>
                            </div>
                            <div className="p-6 bg-white border-t flex gap-3">
                                <input placeholder="Type a message..." className="flex-grow bg-slate-100 rounded-2xl px-5 text-xs font-bold outline-none border-2 border-transparent focus:border-indigo-100" />
                                <button className="bg-indigo-600 text-white p-3.5 rounded-2xl shadow-lg"><Icon name="send" className="w-5 h-5" /></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
