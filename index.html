<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidequest | Real World Task Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const INITIAL_TASKS = [
            { 
                id: 1, title: 'Walk my Golden Retriever', description: 'Need someone to walk my dog Buster for an hour this afternoon around Riverview.', reward: 30, category: 'Errands', status: 'open', 
                postedBy: { name: 'Alex J.', avatar: 'https://ui-avatars.com/api/?name=Alex+J&background=random', rating: 4.8, reviews: 34 },
                timeline: 'Today at 4:00 PM'
            },
            { 
                id: 2, title: 'Clean up yard debris', description: 'Have some branches and leaves from the recent storm that need bagging and removal.', reward: 100, category: 'Labor', status: 'open', 
                postedBy: { name: 'Sarah M.', avatar: 'https://ui-avatars.com/api/?name=Sarah+M&background=random', rating: 5.0, reviews: 8 },
                timeline: 'By Sunday evening'
            },
            { 
                id: 3, title: 'Fix CSS bug on my website', description: 'My navigation bar is broken on mobile. Need a quick React/Tailwind fix.', reward: 50, category: 'Digital', status: 'open', 
                postedBy: { name: 'TechStartup', avatar: 'https://ui-avatars.com/api/?name=TS&background=000&color=fff', rating: 4.9, reviews: 56 },
                timeline: 'ASAP'
            }
        ];

        const CATEGORIES = ['All', 'Labor', 'Errands', 'Digital', 'Services', 'Items'];

        function App() {
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [activeCategory, setActiveCategory] = useState('All');
            const [isPostModalOpen, setIsPostModalOpen] = useState(false);
            const [activeChat, setActiveChat] = useState(null);
            
            // New Task Form State
            const [newTask, setNewTask] = useState({ title: '', description: '', reward: '', category: 'Labor' });

            const handlePostTask = (e) => {
                e.preventDefault();
                const taskToAdd = {
                    ...newTask,
                    id: Date.now(),
                    status: 'open',
                    postedBy: { name: 'Michael', avatar: 'https://ui-avatars.com/api/?name=Michael&background=6366f1&color=fff', rating: 5.0, reviews: 0 },
                    timeline: 'Just now'
                };
                setTasks([taskToAdd, ...tasks]);
                setIsPostModalOpen(false);
                setNewTask({ title: '', description: '', reward: '', category: 'Labor' });
            };

            const filteredTasks = tasks.filter(t => activeCategory === 'All' || t.category === activeCategory);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 h-16 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                <Icon name="briefcase" />
                            </div>
                            <span className="text-xl font-bold tracking-tight">Sidequest</span>
                        </div>
                        <button 
                            onClick={() => setIsPostModalOpen(true)} 
                            className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-indigo-200"
                        >
                            <Icon name="plus-circle" />
                            <span>Post Task</span>
                        </button>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto px-4 py-8">
                        <header className="mb-10">
                            <h1 className="text-3xl font-extrabold text-slate-900 mb-2">Real Life Tasks</h1>
                            <p className="text-slate-500 font-medium">Find local help or earn by completing tasks in your community.</p>
                        </header>

                        {/* Category Filter */}
                        <div className="flex gap-2 mb-8 overflow-x-auto hide-scrollbar pb-2">
                            {CATEGORIES.map(c => (
                                <button 
                                    key={c}
                                    onClick={() => setActiveCategory(c)}
                                    className={`px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${activeCategory === c ? 'bg-slate-900 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:border-indigo-400'}`}
                                >{c}</button>
                            ))}
                        </div>

                        {/* Task Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredTasks.map(task => (
                                <div key={task.id} className="bg-white rounded-2xl border border-slate-200 p-6 flex flex-col hover:border-indigo-300 transition-colors shadow-sm">
                                    <div className="flex justify-between items-start mb-4">
                                        <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-lg uppercase tracking-widest">{task.category}</span>
                                        <span className="text-2xl font-black text-emerald-600">${task.reward}</span>
                                    </div>
                                    <h3 className="text-lg font-bold mb-2 text-slate-800">{task.title}</h3>
                                    <p className="text-slate-500 text-sm mb-6 flex-grow leading-relaxed">{task.description}</p>
                                    
                                    <div className="pt-4 border-t border-slate-100 flex items-center justify-between mb-6">
                                        <div className="flex items-center gap-2">
                                            <img src={task.postedBy.avatar} className="w-8 h-8 rounded-full border border-slate-100" />
                                            <span className="text-sm font-bold">{task.postedBy.name}</span>
                                        </div>
                                        <div className="flex items-center text-slate-400 text-xs font-semibold">
                                            <Icon name="clock" className="w-3.5 h-3.5 mr-1" /> {task.timeline}
                                        </div>
                                    </div>

                                    <button 
                                        onClick={() => setActiveChat(task)}
                                        className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition-all"
                                    >Accept Task</button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* POST TASK MODAL */}
                    {isPostModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="text-xl font-bold">Create New Task</h2>
                                    <button onClick={() => setIsPostModalOpen(false)} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={handlePostTask} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Task Title</label>
                                        <input required type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="e.g. Help moving a couch" onChange={e => setNewTask({...newTask, title: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Category</label>
                                            <select className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" onChange={e => setNewTask({...newTask, category: e.target.value})}>
                                                {CATEGORIES.slice(1).map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Reward ($)</label>
                                            <input required type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="25" onChange={e => setNewTask({...newTask, reward: e.target.value})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Description</label>
                                        <textarea required className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none h-24" placeholder="Describe what you need help with..." onChange={e => setNewTask({...newTask, description: e.target.value})}></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">Publish Task</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* CHAT MODAL (Placeholder) */}
                    {activeChat && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/40 backdrop-blur-sm p-0 sm:p-4">
                            <div className="bg-white w-full sm:w-[400px] h-[70vh] sm:h-[550px] flex flex-col rounded-t-3xl sm:rounded-3xl shadow-2xl">
                                <div className="p-4 border-b flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <img src={activeChat.postedBy.avatar} className="w-10 h-10 rounded-full" />
                                        <div>
                                            <h4 className="font-bold leading-none">{activeChat.postedBy.name}</h4>
                                            <span className="text-[10px] text-slate-400 uppercase font-black tracking-tighter">Task Owner</span>
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveChat(null)} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="x" /></button>
                                </div>
                                <div className="flex-grow p-6 flex flex-col items-center justify-center text-center space-y-4">
                                    <div className="bg-indigo-50 p-4 rounded-full text-indigo-600"><Icon name="message-square" className="w-8 h-8" /></div>
                                    <h3 className="font-bold text-lg text-slate-800">Chat with {activeChat.postedBy.name}</h3>
                                    <p className="text-sm text-slate-500 px-6">Connecting a database (Firebase) will allow you to send real-time messages here.</p>
                                    <button onClick={() => setActiveChat(null)} className="bg-slate-100 text-slate-600 px-6 py-2 rounded-full font-bold text-sm">Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
